<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIDS - Torneo Internacional de Soccer 2026</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>

    <header>
        <h1>Torneo Internacional de Soccer 2026</h1>
        <p class="subtitle">Arrastra para explorar • Scroll para Zoom • Doble click para reiniciar vista</p>
    </header>
    <div class="controls-hint">Cualquier parecido con torneos realizados por cierta Entidad de 4 letras es mera coincidencia.</div>

    <!-- Panel de control flotante -->
    <div class="control-panel">
        <button class="control-btn" onclick="zoomIn()" title="Acercar"><span class="material-symbols-outlined">
add
</span></button>
        <button class="control-btn" onclick="zoomOut()" title="Alejar"><span class="material-symbols-outlined">
remove
</span></button>
        <button class="control-btn" onclick="resetView()" title="Centrar Vista"><span class="material-symbols-outlined">
refresh
</span></button>
    </div>

    <div class="viewport" id="viewport">
        <div class="bracket-container" id="bracketContainer">
            
            <div class="side-container left-side">
                <div class="round round_16" id="round1-left"></div>
                <div class="round round_8" id="round2-left"></div>
                <div class="round round_4" id="round3-left"></div>
                <div class="round round_2" id="round4-left"></div>
            </div>

            <div class="center-side">
                <div style="text-align: center; font-weight: bold; color: var(--accent); letter-spacing: 2px; font-size: 0.9rem;">GRAN FINAL</div>
                <div id="final-match-container"></div>
                <div id="champion-container">
                    <div class="champion-title">CAMPEÓN</div>
                    <div id="champion-display" class="champion-team">?</div>
                </div>
            </div>

            <div class="side-container right-side" style="flex-direction: row-reverse;">
                <div class="round round_16" id="round1-right"></div>
                <div class="round round_8" id="round2-right"></div>
                <div class="round round_4" id="round3-right"></div>
                <div class="round round_2" id="round4-right"></div>
            </div>

        </div>
    </div>

    <script src="script.js?v=2"></script>
</body>
</html>
